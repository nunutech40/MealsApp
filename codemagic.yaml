workflows:
  ios_ci:
    name: iOS CI (auto-detect path)
    max_build_duration: 60
    environment:
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Debug layout
        script: |
          echo "PWD=$(pwd)"
          echo "=== Struktur repo ==="
          # Mencari file proyek saja, mengabaikan xcworkspace dan Podfile
          # Mencari hingga kedalaman 3 untuk menemukan proyek yang berada di sub-folder
          find . -maxdepth 3 -type f -name "*.xcodeproj"

      - name: Build for iOS Simulator (auto detect)
        script: |
          set -euo pipefail
          # CARI HANYA FILE .XCODEPROJECT DENGAN MAXDEPTH 3
          PROJECT_PATH="$(find . -maxdepth 3 -name '*.xcodeproj' | head -n1 || true)"
          
          # JANGAN ADA LOGIKA WORKSPACE_PATH

          if [ -z "$PROJECT_PATH" ]; then
            echo "❌ Tidak menemukan .xcodeproj."
            # Debug: Tampilkan isi direktori untuk membantu diagnosis
            echo "Isi direktori:"
            ls -alR
            exit 1
          fi

          SCHEME_NAME="MealsApp"
          BUILD_COMMAND="-project" # Memaksa penggunaan -project

          echo "Project : $PROJECT_PATH"
          echo "Scheme  : $SCHEME_NAME"

          # HANYA SATU BLOK XCODEBUILD (MENGHAPUS | XCPRETTY)
          # Tujuannya agar LOG error yang SEBENARNYA terlihat jelas
          xcodebuild \
            "$BUILD_COMMAND" "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
            clean build

    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Logs/**/*
    publishing:
      email:
        recipients:
          - nunutech4.0@gmail.com
        notify:
          success: false
          failure: true
